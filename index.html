<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>منيو كافيه دوم</title>
<style>
  :root {
    --background-color: #3e2f2f;
    --card-background: #5a283a;
    --text-color: #f2d4cd;
    --accent-color: #bd6377;
    --overlay-bg: rgba(0, 0, 0, 0.95);
  }
  body { margin: 0; font-family: sans-serif; background-color: var(--background-color); color: var(--text-color); display: flex; flex-direction: column; min-height: 100vh; }
  header { padding: 1.5rem; text-align: center; font-size: 2rem; font-weight: bold; background-color: var(--card-background); border-bottom: 3px solid var(--accent-color); }
  main { flex-grow: 1; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; max-width: 600px; margin: 0 auto 100px; }
  .menu-image { background-color: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; }
  .menu-image img { width: 100%; height: auto; display: block; }
  #overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--overlay-bg); display: none; justify-content: center; align-items: center; z-index: 3000; }
  #overlay img { max-width: 95%; max-height: 90%; border-radius: 5px; }
  #overlay.show { display: flex; }
  .close-btn { position: fixed; top: 20px; right: 20px; font-size: 2.5rem; color: white; cursor: pointer; }
  footer { text-align: center; padding: 1.5rem; background: var(--card-background); }
  .contact-buttons { position: fixed; bottom: 25px; left: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 2000; }
  .contact-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
  .contact-btn img { width: 30px; height: 30px; }
</style>
</head>
<body>

<header>قائمة مقهى دوم</header>

<main>
  <div class="menu-image" onclick="showImg('https://i.postimg.cc/85zZ6R5y/menu1.png')">
    <img src="https://i.postimg.cc/85zZ6R5y/menu1.png" alt="منيو 1">
  </div>
  <div class="menu-image" onclick="showImg('https://i.postimg.cc/9F4f7Z5W/menu2.png')">
    <img src="https://i.postimg.cc/9F4f7Z5W/menu2.png" alt="منيو 2">
  </div>
  <div class="menu-image" onclick="showImg('https://i.postimg.cc/mD3f0L6S/menu3.png')">
    <img src="https://i.postimg.cc/mD3f0L6S/menu3.png" alt="منيو 3">
  </div>
</main>

<footer>
    <p style="font-size: 1.2rem; margin: 0;">تضاف 12% خدمة</p>
    <p style="font-size: 0.8rem; opacity: 0.7;">Mansoura - Talkha</p>
</footer>

<div id="overlay" onclick="hideImg()"><span class="close-btn">×</span><img id="overlayImg" src=""></div>

<div class="contact-buttons">
  <a href="https://www.tiktok.com/@dome._.cafe?_r=1&_t=ZS-94usYwlf1fx" target="_blank" class="contact-btn" style="background: #000;">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/34/TikTok_logo.svg" alt="TikTok" style="filter: invert(1);">
  </a>
  <a href="https://wa.me/201097343627" target="_blank" class="contact-btn" style="background: #25D366;">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
  </a>
</div>

<script>
  function showImg(src) {
    document.getElementById('overlayImg').src = src;
    document.getElementById('overlay').classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function hideImg() {
    document.getElementById('overlay').classList.remove('show');
    document.body.style.overflow = '';
  }
</script>

</body>
</html>
